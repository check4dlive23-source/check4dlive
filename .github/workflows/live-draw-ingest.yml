name: Live Draw Ingest

on:
  workflow_dispatch:
  schedule:
    # MYT 18:00-20:00 = UTC 10:00-12:00,开彩日:日三六(SG Toto 一/四未接真数据,暂不调度)
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 10 * * 0,3,6"
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 11 * * 0,3,6"
    - cron: "0 12 * * 0,3,6"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger live ingest
        run: |
          curl -s -L --fail-with-body -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET }}" \
            "https://check4dlive.vercel.app/api/admin/live-ingest" \
            -m 60

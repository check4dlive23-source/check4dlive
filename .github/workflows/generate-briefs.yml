name: Generate VYRA Briefs

on:
  workflow_dispatch:
  schedule:
    # UTC 00:00 Sun/Wed/Sat = MYT 08:00 on draw days (primary)
    - cron: "0 0 * * 0,3,6"
    # UTC 01:00 Sun/Wed/Sat = MYT 09:00 (backup 1)
    - cron: "0 1 * * 0,3,6"
    # UTC 03:00 Sun/Wed/Sat = MYT 11:00 (backup 2)
    - cron: "0 3 * * 0,3,6"

jobs:
  generate-briefs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger VYRA brief generation
        run: |
          curl -s -L --fail-with-body -X POST \
            -H "Authorization: Bearer ${{ secrets.INGEST_SECRET }}" \
            "https://check4dlive.vercel.app/api/admin/generate-briefs" \
            -m 300
